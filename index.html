<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>ODPT GTFS-RT解析テスト</title>
<style>body{font-family:Arial,sans-serif;padding:20px}input{width:100%;padding:8px}button{padding:8px 14px;margin:6px 0}pre{background:#f4f4f4;padding:10px;white-space:pre-wrap}</style>
</head><body>
<h2>ODPT GTFS-Realtime解析テスト</h2>
<p>protobuf.js(gtfs-realtime-bindings)を後から追加できるようにした雛形です。</p>
<input id="token" placeholder="consumerKey">
<button id="run">取得テスト</button>
<pre id="log"></pre>
<script>
const log=document.getElementById("log");
const w=t=>log.textContent+=t+"\n";
run.onclick=async()=>{
 log.textContent="";
 const token=document.getElementById("token").value.trim();
 const url=`https://api.odpt.org/api/v4/gtfs/realtime/SeibuBus_trip_update?acl:consumerKey=${encodeURIComponent(token)}`;
 try{
   const r=await fetch(url);
   w("Status: "+r.status);
   w("Type: "+r.type);
   const buf=await r.arrayBuffer();
   w("Bytes: "+buf.byteLength);
   w("");
   w("通信成功");
   w("次のステップ:");
   w("1. protobuf.js を読み込む");
   w("2. gtfs-realtime.proto を読み込む");
   w("3. FeedMessage.decode() を実行");
   w("4. entity[].tripUpdate を表示");
   w("");
   w("※このテストツールは通信確認用です。");
 }catch(e){w("Error: "+e);}
}
</script></body></html>
